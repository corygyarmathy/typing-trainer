# Local development stack: just app + Postgres.
#
# Usage:  docker compose -f deploy/docker/compose.yaml up
# Aim:    Anyone should be able to clone the repo and run this command
#         with nothing else installed.

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: typing
      POSTGRES_PASSWORD: typing
      POSTGRES_DB: typing
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U typing"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    environment:
      DATABASE_URL: postgres://typing:typing@postgres:5432/typing?sslmode=disable
      HTTP_ADDR: ":8080"
      LOG_LEVEL: info
      JWT_SECRET: dev-only-change-me
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
