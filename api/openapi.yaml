openapi: "3.0.3"
# TODO: explore implementation of 3.1 spec w/ overlays, or even different tools.
#       Consider whether using the older OpenAPI spec matters or not.

info:
  title: Typist API
  version: "1.0.0"
  description: |
    Backend for the adaptive typing trainer. The client requests the next
    lesson, the user types it, and the client submits per-item observations.
    The server folds those into the user's competency state (via the adaptive
    engine) and records a session summary.

    Written to OpenAPI 3.0.3 for clean `oapi-codegen` support. Server
    interfaces are generated from this file; handlers implement them.

    Tracking 3.1 implementation as per:
    - https://github.com/oapi-codegen/oapi-codegen/pull/2336
    - https://github.com/oapi-codegen/oapi-codegen/issues/373

    Note: the internal sshd-only token-exchange endpoint (ADR 0007) is
    deliberately omitted. It is not part of the public contract.

servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://typist.gyarmathy.co
    description: Homelab deployment

# Phase 4 work: define paths as the handlers are built.
# Potential initial surface:
#
#   POST   /auth/register
#   POST   /auth/login
#   POST   /auth/refresh
#
#   GET    /progress              - current competency snapshot
#   GET    /lessons/next          - generate next lesson
#   POST   /sessions              - submit a completed session result
#   GET    /sessions              - list past sessions (paginated)
#
# Generate server interfaces with oapi-codegen and implement them in
# each domain package's handler.go.

paths:
  /health:
    get:
      summary: Liveness check
      operationId: getHealth
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"

components:
  schemas:
    Health:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
