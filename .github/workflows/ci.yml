name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: typing
          POSTGRES_PASSWORD: typing
          POSTGRES_DB: typing
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      - name: go test
        env:
          DATABASE_URL: postgres://typing:typing@localhost:5432/typing?sslmode=disable
        run: go test -race -cover ./...

      - name: build
        run: go build ./...

  dev-shell:
    # Validate the Nix dev shell so flake.lock / flake.nix changes (including the
    # weekly Dependabot bumps) are exercised through the Nix path. Dependabot PRs
    # trigger this automatically, so it is the validation gate for those bumps.
    # Grows naturally once `nix build` / the NixOS module lands (ADR-0006).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - name: Build and lint inside the dev shell
        run: |
          nix develop -c bash -c 'set -e; go version; go vet ./...; go build ./...; golangci-lint run ./...'

  build-image:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build Docker image
        run: docker build -f deploy/docker/Dockerfile -t typist:${{ github.sha }} .
